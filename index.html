<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chatter</title>
    <style>
        :root {
            --bg-darker: #1e1f22;
            --bg-dark: #2b2d31;
            --bg-light: #313338;
            --text: #dbdee1;
            --crimson: #dc143c;
        }
        body { margin: 0; display: flex; height: 100vh; font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg-dark); color: var(--text); overflow: hidden; }
        
        /* Sidebar (Channels) */
        .sidebar { width: 240px; background: var(--bg-darker); display: flex; flex-direction: column; }
        .sidebar-header { padding: 15px; border-bottom: 1px solid #111; font-weight: bold; font-size: 1.1rem; }
        .channel-list { padding: 10px; flex-grow: 1; }
        .channel-item { padding: 8px 12px; border-radius: 4px; cursor: pointer; margin-bottom: 2px; color: #949ba4; }
        .channel-item:hover { background: #35373c; color: white; }
        .channel-item.active { background: #3f4147; color: white; }
        .channel-item::before { content: "# "; font-size: 1.2rem; }

        /* Main Chat Area */
        .chat-area { flex-grow: 1; display: flex; flex-direction: column; background: var(--bg-light); }
        .chat-header { padding: 15px; background: var(--bg-light); border-bottom: 1px solid #26272b; font-weight: bold; }
        #message-window { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        
        .message { display: flex; flex-direction: column; }
        .msg-user { font-weight: bold; font-size: 0.95rem; color: white; margin-bottom: 4px; }
        .msg-text { font-size: 0.95rem; line-height: 1.4; color: var(--text); }
        
        .input-wrapper { padding: 0 20px 20px; }
        .input-box { background: #383a40; border-radius: 8px; padding: 10px 15px; display: flex; }
        input { flex-grow: 1; background: transparent; border: none; color: white; outline: none; font-size: 1rem; }

        /* User List */
        .user-sidebar { width: 200px; background: var(--bg-darker); padding: 15px; }
        .user-sidebar h4 { font-size: 0.75rem; text-transform: uppercase; color: #949ba4; margin-bottom: 15px; }
        .user-item { display: flex; align-items: center; gap: 10px; font-size: 0.9rem; margin-bottom: 12px; }
        .status-dot { width: 10px; height: 10px; background: #23a55a; border-radius: 50%; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">CrimsonFlame</div>
        <div class="channel-list">
            <div class="channel-item active">general</div>
            <div class="channel-item">support</div>
            <div class="channel-item">dev-log</div>
        </div>
    </div>

    <div class="chat-area">
        <div class="chat-header"># general</div>
        <div id="message-window">
            <div class="message">
                <span class="msg-user">System</span>
                <span class="msg-text">Welcome to the chat.</span>
            </div>
        </div>
        <form class="input-wrapper" id="chat-form">
            <div class="input-box">
                <input type="text" id="user-input" placeholder="Message #general" autocomplete="off">
            </div>
        </form>
    </div>

    <div class="user-sidebar">
        <h4>Online — 1</h4>
        <div class="user-item">
            <div class="status-dot"></div>
            <span>Current User</span>
        </div>
    </div>

    <script>
        const form = document.getElementById('chat-form');
        const win = document.getElementById('message-window');
        const input = document.getElementById('user-input');

        form.onsubmit = (e) => {
            e.preventDefault();
            const text = input.value.trim();
            if (!text) return;

            const msgDiv = document.createElement('div');
            msgDiv.className = 'message';
            msgDiv.innerHTML = `
                <span class="msg-user">You</span>
                <span class="msg-text">${text}</span>
            `;
            win.appendChild(msgDiv);
            
            input.value = '';
            win.scrollTop = win.scrollHeight;
        };
    </script>
</body>
</html>
