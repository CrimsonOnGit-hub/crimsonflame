<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrimsonFlame | Protocol</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

    <header>
        <div class="container header-container">
            <h1 class="logo">CRIMSON<span>FLAME</span></h1>
            <nav>
                <ul>
                    <li><a href="?page=home">News</a></li>
                    <li><a href="?page=tickets">Support</a></li>
                    <li><a href="?page=login" id="nav-auth-link">Login</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main id="page-home" class="page-content">
        <section class="hero"><div class="container"><h2>News Feed</h2></div></section>
        <section class="container"><div id="news-feed">Loading grid...</div></section>
    </main>

    <main id="page-login" class="page-content" style="display:none;">
        <section class="auth-container">
            <div class="auth-card">
                <div id="login-container">
                    <h2 id="auth-title">Agent Login</h2>
                    <form id="login-form">
                        <input type="email" id="email" placeholder="Email" required>
                        <input type="password" id="password" placeholder="Password" required>
                        <button type="submit" class="btn-primary">Initialize</button>
                    </form>
                    <p class="toggle-text">Need clearance? <span id="toggle-auth" class="text-link">Register</span></p>
                </div>
                <div id="dashboard" style="display:none;">
                    <h3>Welcome back, Agent.</h3>
                    <div id="admin-panel" style="display:none;">
                        <hr><p style="color:var(--crimson)">ADMIN CONSOLE ACTIVE</p>
                        <form id="news-form">
                            <input type="text" id="news-title" placeholder="Update Title" required>
                            <textarea id="news-body" placeholder="Markdown content..." rows="5" required></textarea>
                            <button type="submit" class="btn-primary">Publish Update</button>
                        </form>
                    </div>
                    <button id="logout-btn" class="btn-secondary">Disconnect</button>
                </div>
            </div>
        </section>
    </main>

    <main id="page-tickets" class="page-content" style="display:none;">
        <section class="container" style="padding-top:40px;">
            <h2 class="section-title">Support Tickets</h2>
            <div id="ticket-auth-check">
                <p>You must be logged in to access the Support Protocol.</p>
                <a href="?page=login" class="btn-primary" style="display:inline-block; text-decoration:none;">Go to Login</a>
            </div>
            
            <div id="ticket-system" style="display:none;">
                <div class="auth-card" style="max-width:100%; text-align:left;">
                    <h3>Open a New Ticket</h3>
                    <form id="ticket-form">
                        <input type="text" id="ticket-subject" placeholder="Subject (e.g., Cosmetic missing)" required>
                        <textarea id="ticket-msg" placeholder="Describe your issue..." rows="3" required></textarea>
                        <button type="submit" class="btn-primary">Submit Ticket</button>
                    </form>
                </div>
                <br>
                <h3>Your Tickets</h3>
                <div id="ticket-list">Loading tickets...</div>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, where } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBSSJKDrFJ1_qlliZqgw34CY2TSaKOxxxM",
            authDomain: "crimsonflame-8169e.firebaseapp.com",
            projectId: "crimsonflame-8169e",
            storageBucket: "crimsonflame-8169e.firebasestorage.app",
            messagingSenderId: "406321213530",
            appId: "1:406321213530:web:92d27a69d34d147393a863"
        };

        const ADMIN_EMAIL = "allaboutwaterdiamond@gmail.com";
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- ROUTING LOGIC ---
        function route() {
            const params = new URLSearchParams(window.location.search);
            const page = params.get('page') || 'home';
            document.querySelectorAll('.page-content').forEach(p => p.style.display = 'none');
            const target = document.getElementById('page-' + page);
            if (target) target.style.display = 'block';
            if (page === 'home') loadNews();
            if (page === 'tickets') loadTickets();
        }
        window.onpopstate = route;
        route();

        // --- NEWS LOGIC ---
        async function loadNews() {
            const q = query(collection(db, "news"), orderBy("timestamp", "desc"));
            const snap = await getDocs(q);
            const feed = document.getElementById('news-feed');
            feed.innerHTML = "";
            snap.forEach(doc => {
                const data = doc.data();
                feed.innerHTML += `<article class="news-card"><span class="news-date">${data.date}</span><h3>${data.title}</h3><div>${marked.parse(data.body)}</div></article>`;
            });
        }

        document.getElementById('news-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            await addDoc(collection(db, "news"), {
                title: document.getElementById('news-title').value,
                body: document.getElementById('news-body').value,
                date: new Date().toLocaleDateString(),
                timestamp: new Date()
            });
            alert("Published!");
            loadNews();
        });

        // --- TICKET LOGIC ---
        async function loadTickets() {
            if (!auth.currentUser) return;
            const container = document.getElementById('ticket-list');
            // If admin, show everything. If user, show only theirs.
            let q = query(collection(db, "tickets"), orderBy("timestamp", "desc"));
            if (auth.currentUser.email !== ADMIN_EMAIL) {
                q = query(collection(db, "tickets"), where("userId", "==", auth.currentUser.uid), orderBy("timestamp", "desc"));
            }
            const snap = await getDocs(q);
            container.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                container.innerHTML += `<div class="news-card" style="padding:20px;">
                    <strong>${d.subject}</strong> <small>(${d.status})</small><br>
                    <p style="font-size:0.9rem">${d.message}</p>
                    <small>From: ${d.userEmail}</small>
                </div>`;
            });
        }

        document.getElementById('ticket-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            await addDoc(collection(db, "tickets"), {
                userId: auth.currentUser.uid,
                userEmail: auth.currentUser.email,
                subject: document.getElementById('ticket-subject').value,
                message: document.getElementById('ticket-msg').value,
                status: "Open",
                timestamp: new Date()
            });
            alert("Ticket Submitted!");
            document.getElementById('ticket-form').reset();
            loadTickets();
        });

        // --- AUTH LOGIC ---
        onAuthStateChanged(auth, (user) => {
            const navLink = document.getElementById('nav-auth-link');
            if (user) {
                navLink.innerText = "Dashboard";
                document.getElementById('login-container').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                document.getElementById('ticket-auth-check').style.display = 'none';
                document.getElementById('ticket-system').style.display = 'block';
                if (user.email === ADMIN_EMAIL) document.getElementById('admin-panel').style.display = 'block';
            } else {
                navLink.innerText = "Login";
                document.getElementById('login-container').style.display = 'block';
                document.getElementById('dashboard').style.display = 'none';
                document.getElementById('ticket-auth-check').style.display = 'block';
                document.getElementById('ticket-system').style.display = 'none';
            }
            route(); // Refresh page state
        });

        // Handle Login/Register Forms (Standard Firebase stuff)
        let isLogin = true;
        document.getElementById('toggle-auth').onclick = () => {
            isLogin = !isLogin;
            document.getElementById('auth-title').innerText = isLogin ? "Agent Login" : "Clearance Request";
            document.getElementById('toggle-auth').innerText = isLogin ? "Register" : "Login";
        };

        document.getElementById('login-form').onsubmit = (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            if (isLogin) signInWithEmailAndPassword(auth, email, pass).catch(err => alert(err.message));
            else createUserWithEmailAndPassword(auth, email, pass).catch(err => alert(err.message));
        };

        document.getElementById('logout-btn').onclick = () => signOut(auth);
    </script>
</body>
</html>
