<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Light Modal Test</title>
    <style>
        /* General Page Styling for Context */
        body {
            background-color: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* --- LIQUID LIGHT CSS --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; 
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.75);
            display: flex; 
            align-items: center; 
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.3s ease;
        }

        .liquid-modal {
            background: rgba(255, 255, 255, 0.08); /* Transparent Glass Base */
            backdrop-filter: blur(15px); /* Frosted Blur */
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15); /* Subtle Glow Border */
            border-radius: 12px;
            width: 380px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            animation: modalPop 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes modalPop {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-header {
            height: 45px;
            background: linear-gradient(180deg, #9ccc65 0%, #689f38 100%); /* ForestFire/Miiverse Green */
            border-bottom: 2px solid rgba(0, 0, 0, 0.2);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.4);
        }

        .modal-body {
            padding: 25px;
            text-align: center;
            color: #ffffff;
        }

        #modal-prompt-text {
            font-size: 16px;
            margin-bottom: 20px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        /* Glassmorphic Input Box */
        .liquid-input {
            width: 85%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(139, 195, 74, 0.5); /* Faint Green Border */
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: border 0.3s ease, box-shadow 0.3s ease;
        }

        .liquid-input:focus {
            border-color: #8bc34a;
            box-shadow: 0 0 8px rgba(139, 195, 74, 0.4);
        }

        /* Buttons Styling */
        .modal-buttons {
            margin-top: 25px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .modal-btn {
            padding: 10px 30px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
        }

        .btn-ok {
            background: #f0f0f0;
            color: #333;
            box-shadow: 0 4px #ccc;
        }

        .btn-ok:active {
            transform: translateY(2px);
            box-shadow: 0 2px #ccc;
        }

        .btn-cancel {
            background: transparent;
            color: #aaa;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-cancel:hover {
            color: #fff;
            background: rgba(255,255,255,0.05);
        }

        .hidden { display: none !important; }

        /* Trigger Button for testing */
        .trigger {
            padding: 15px 30px;
            background: #8bc34a;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <button class="trigger" onclick="testModal()">Open Dialog Modal</button>

    <div id="liquid-modal-overlay" class="modal-overlay hidden">
        <div class="liquid-modal">
            <div class="modal-header"></div>
            <div class="modal-body">
                <p id="modal-prompt-text">Input required:</p>
                
                <input type="text" id="modal-input" class="liquid-input" autocomplete="off">
                
                <div class="modal-buttons">
                    <button class="modal-btn btn-cancel" onclick="closeLiquidModal()">Cancel</button>
                    <button id="modal-submit-btn" class="modal-btn btn-ok">OK</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        /**
         * Logic to replace standard prompt() with your custom Liquid Light Dialog
         * @param {string} text - The question to ask the user
         * @param {function} callback - Function to run when user clicks OK
         */
        function openLiquidModal(text, callback) {
            const overlay = document.getElementById('liquid-modal-overlay');
            const promptText = document.getElementById('modal-prompt-text');
            const inputField = document.getElementById('modal-input');
            const submitBtn = document.getElementById('modal-submit-btn');

            // Reset and Show
            promptText.innerText = text;
            inputField.value = "";
            overlay.classList.remove('hidden');
            inputField.focus();

            // Handle Submission
            submitBtn.onclick = function() {
                const val = inputField.value.trim();
                if (val !== "") {
                    callback(val); // Run the function with the input
                    closeLiquidModal();
                } else {
                    // Quick "Shaking" effect or red border if empty
                    inputField.style.borderColor = "red";
                    setTimeout(() => inputField.style.borderColor = "", 500);
                }
            };

            // Allow "Enter" key to submit
            inputField.onkeypress = function(e) {
                if (e.key === 'Enter') submitBtn.click();
            };
        }

        function closeLiquidModal() {
            document.getElementById('liquid-modal-overlay').classList.add('hidden');
        }

        // --- HOW TO TEST IT ---
        function testModal() {
            openLiquidModal("Enter a name for your community:", function(inputValue) {
                alert("You typed: " + inputValue);
                // Here is where you'd send 'inputValue' to your database or Firebase
            });
        }
    </script>
</body>
</html>
