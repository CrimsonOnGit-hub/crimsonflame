<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatter | CrimsonFlame</title>
    <link rel="stylesheet" href="style.css">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jerosoler/Drawflow/dist/drawflow.min.css">
    <script src="https://cdn.jsdelivr.net/gh/jerosoler/Drawflow/dist/drawflow.min.js"></script>
</head>
<body>

    <nav style="height: 60px; box-sizing: border-box;">
        <div class="nav-logo" onclick="window.routeTo('home')">CrimsonFlame <span style="color:var(--text-muted); font-size:1rem;">| Chatter</span></div>
        <div class="nav-links">
            <a onclick="window.routeTo('home')" class="nav-btn">Back to Hub</a>
            <a onclick="window.routeTo('dashboard')" class="nav-btn">Dashboard</a>
        </div>
    </nav>

    <main id="chatter-locked" style="display: flex; justify-content: center; align-items: center; height: calc(100vh - 60px);">
        <div class="card-container" style="text-align: center; max-width: 400px;">
            <h2>Access Denied</h2>
            <p>You must be logged in to access Chatter.</p>
            <button class="btn-primary" onclick="window.routeTo('dashboard')">Go to Login</button>
        </div>
    </main>

    <div id="chatter-system" style="display: none;">
        
        <div class="server-sidebar" id="server-list-container">
            <div class="server-icon" onclick="window.openDiscovery()" title="Discover Servers" id="btn-discovery" style="background: #232428; color: #4ade80;">
                <span style="font-size: 1.5rem; font-weight: bold;">+</span>
            </div>
            <div style="width: 32px; height: 2px; background: rgba(255,255,255,0.1); border-radius: 1px;"></div>
            <div id="server-list" style="display: flex; flex-direction: column; gap: 10px; width: 100%; align-items: center;"></div>
        </div>

        <div class="channel-sidebar">
            <div class="sidebar-header">
                <span id="active-server-name">Loading...</span>
                <button id="server-settings-btn" class="icon-button" style="display:none;" onclick="window.openServerSettings()" title="Server Settings">Settings</button>
            </div>
            <div class="channel-list-container" id="channel-list"></div>
            <div style="padding: 10px;">
                <button id="add-channel-btn" class="btn-secondary" style="display:none; width: 100%; font-size: 0.8rem;" onclick="window.createChannel()">Create Channel</button>
            </div>
        </div>

        <div class="chat-area">
            <div class="chat-header">
                <span id="active-channel-name">Select a channel</span>
            </div>
            
            <div class="chat-box" id="chat-box"></div>
            <div class="discovery-box" id="discovery-box"></div>

            <div class="chat-input-area">
                <form id="chat-form" onsubmit="window.submitChat(event)" style="display:none;">
                    <div class="chat-input-wrapper">
                        <input type="text" id="chat-input" placeholder="Message..." autocomplete="off">
                    </div>
                </form>
            </div>
        </div>

    </div>

    <div id="server-settings-modal" class="custom-modal-overlay settings-modal-overlay" style="z-index: 1000; background: rgba(0,0,0,0.8);">
        <div style="width: 90%; max-width: 1000px; height: 80vh; background: #313338; border-radius: 12px; display: flex; overflow: hidden; border: 1px solid #1e1f22;">
            
            <div class="settings-sidebar">
                <h3 style="margin-top: 0; color: #dbdee1;">Settings</h3>
                <div style="display: flex; flex-direction: column; gap: 10px;">
                    <button class="btn-secondary" style="text-align: left; background: transparent; border: none; color: white;" onclick="document.getElementById('server-settings-main-view').style.display='block'; document.getElementById('bot-builder-ui').style.display='none';">Overview</button>
                </div>
                <div style="margin-top: auto; padding-top: 20px;">
                    <button class="btn-danger" style="width: 100%;" onclick="document.getElementById('server-settings-modal').classList.remove('active');">Close</button>
                </div>
            </div>

            <div id="server-settings-main-view" class="settings-content">
                <h2>Server Overview</h2>
                <div style="display: flex; gap: 20px; align-items: flex-start;">
                    <div>
                        <img id="server-icon-preview" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" style="width: 100px; height: 100px; border-radius: 16px; object-fit: cover; display: none;">
                        <div id="server-drop-zone" class="drop-zone" style="margin-top: 10px; padding: 10px; width: 100px;">
                            <span style="font-size: 0.8rem;">Change Icon</span>
                            <input type="file" accept="image/*" style="display:none;">
                        </div>
                        <div id="server-upload-status" class="status-text" style="font-size: 0.8rem; text-align: center;"></div>
                    </div>
                    <div style="flex: 1;">
                        <h3>Custom Bots (Apps)</h3>
                        <p style="color: #949ba4; font-size: 0.9rem;">Create interactive slash commands and webhooks.</p>
                        <button class="btn-primary" onclick="window.startVisualBotBuilder()">Create New Bot</button>
                        <div id="bot-list" style="margin-top: 20px; display: flex; flex-direction: column; gap: 10px;"></div>
                    </div>
                </div>
            </div>

            <div id="bot-builder-ui" class="settings-content" style="display: none; flex-direction: column; padding: 0;">
                
                <div style="padding: 15px; background: #2b2d31; border-bottom: 1px solid #1e1f22; display: flex; justify-content: space-between; align-items: center;">
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <h3 style="margin: 0;">Bot Builder</h3>
                        <input type="text" id="botName" placeholder="Bot Name..." style="background: #1e1f22; border: 1px solid #383a40; color: white; padding: 8px; border-radius: 6px;">
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <button class="btn-secondary" onclick="window.cancelBotBuild()">Cancel</button>
                        <button class="btn-primary" onclick="window.saveVisualBot()">Save Bot</button>
                    </div>
                </div>

                <div style="display: flex; flex: 1; overflow: hidden;">
                    <div style="width: 250px; background: #2b2d31; border-right: 1px solid #1e1f22; padding: 15px; overflow-y: auto;">
                        <h4 style="margin-top: 0; color: #dbdee1;">Nodes</h4>
                        <button class="palette-btn" onclick="window.addBotNode('trigger')">Trigger (/command)</button>
                        <button class="palette-btn" onclick="window.addBotNode('action')">Chat Reply</button>
                        <button class="palette-btn" onclick="window.addBotNode('set_variable')">Set Variable</button>
                        <button class="palette-btn" onclick="window.addBotNode('discord_webhook')">Discord Webhook</button>
                        <button class="palette-btn" onclick="window.addBotNode('code')">Discord API Send</button>
                        <button class="palette-btn" onclick="window.addBotNode('webhook')">Generic Webhook</button>
                    </div>
                    <div style="flex: 1; position: relative;">
                        <div id="drawflow-container" style="width: 100%; height: 100%; border: none; border-radius: 0;"></div>
                    </div>
                </div>

            </div>

        </div>
    </div>

    <div id="custom-prompt" class="custom-modal-overlay">
        <div class="custom-modal-box"><div class="custom-modal-content">
            <h3 id="custom-prompt-title" class="custom-modal-title">Prompt</h3>
            <p id="custom-prompt-desc" class="custom-modal-text"></p>
            <input type="text" id="custom-prompt-input" class="custom-modal-input" autocomplete="off">
            <div class="custom-modal-buttons">
                <button id="custom-prompt-cancel" class="custom-modal-btn cancel">Cancel</button>
                <button id="custom-prompt-confirm" class="custom-modal-btn confirm">Confirm</button>
            </div>
        </div></div>
    </div>
    
    <div id="custom-alert" class="custom-modal-overlay">
        <div class="custom-modal-box"><div class="custom-modal-content">
            <h3 class="custom-modal-title">CrimsonFlame Alert</h3>
            <p id="custom-alert-message" class="custom-modal-text"></p>
            <button id="custom-alert-ok" class="custom-modal-btn confirm" style="width: 50%;">OK</button>
        </div></div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
